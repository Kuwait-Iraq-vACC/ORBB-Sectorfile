name: VFPC JSON Compiler

on:
  push:
    branches:
      - main
    paths:
      - '.data/VFPC/**/*.json'
      - '.data/VFPC/**/.Index.txt'
      - '.github/workflows/Concatenate-VFPC-Shared.yml'
      - '.github/scripts/VFPC/Concatenate-VFPC-Shared.py'

concurrency:
  group: VFPC-Compile
  cancel-in-progress: true

jobs:
  compile:
    name: Compile VFPC JSON Files
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run JSON compiler
        run: python .github/scripts/VFPC/Concatenate-VFPC-Shared.py

      - name: Commit compiled files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          git add ORBB/Plugins/VFPC/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Compile VFPC JSON files | ${{ github.event.head_commit.message }}

            Co-authored-by: ${{ github.event.head_commit.author.name }} <${{ github.event.head_commit.author.email }}>"
            git pull --rebase
            git push
          fi