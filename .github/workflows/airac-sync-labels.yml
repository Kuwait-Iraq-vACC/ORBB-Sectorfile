name: Sync AIRAC Labels

on:
  push:
    branches: [main]
    paths:
      - ".github/airac-cycles.yml"
  schedule:
    - cron: "4 18 * * *" # 0000z daily
  workflow_dispatch:
    inputs:
      max_upcoming:
        description: "Number of upcoming AIRAC cycles to create labels for"
        required: false
        type: number
        default: 4

permissions: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Generate GitHub token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/airac-cycles.yml
          sparse-checkout-cone-mode: false
          persist-credentials: false
          token: ${{ steps.generate-token.outputs.token }}

      - name: Sync labels and milestones
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          MAX_UPCOMING: ${{ inputs.max_upcoming || 4 }}
        shell: bash
        run: |
          LABEL_COLOR="DC521D"
          TODAY=$(date -u +%Y-%m-%d)
          CUTOFF_DATE=$(date -u -d "-90 days" +%Y-%m-%d 2>/dev/null \
                     || date -u -v-90d +%Y-%m-%d) # GNU/BSD compat

          echo "Syncing AIRAC labels and milestones (today: $TODAY, cutoff: $CUTOFF_DATE, max upcoming: $MAX_UPCOMING)..."

          # ── Helpers ────────────────────────────────────────────────────────────

          # Returns the milestone number for a given title, or empty string
          milestone_number() {
            local title="$1"
            gh api "repos/$GH_REPO/milestones?state=all&per_page=100" \
              --jq ".[] | select(.title == \"$title\") | .number" | head -1
          }

          # Creates or updates a milestone; echoes its number
          upsert_milestone() {
            local title="$1" due_date="$2" description="$3"
            local due_on="${due_date}T00:00:00Z"
            local existing
            existing=$(milestone_number "$title")

            if [[ -n "$existing" ]]; then
              gh api "repos/$GH_REPO/milestones/$existing" -X PATCH \
                -f title="$title" \
                -f description="$description" \
                -f due_on="$due_on" \
                -f state="open" \
                --silent
              echo "$existing"
            else
              gh api "repos/$GH_REPO/milestones" -X POST \
                -f title="$title" \
                -f description="$description" \
                -f due_on="$due_on" \
                -f state="open" \
                --jq '.number'
            fi
          }

          # Deletes a milestone if it exists and has no open issues or PRs
          delete_milestone_if_empty() {
            local title="$1"
            local number
            number=$(milestone_number "$title")
            [[ -z "$number" ]] && return

            local open_items
            open_items=$(gh api "repos/$GH_REPO/milestones/$number" --jq '.open_issues')
            if [[ "$open_items" -eq 0 ]]; then
              gh api "repos/$GH_REPO/milestones/$number" -X DELETE --silent
              echo "Deleted milestone: $title"
            else
              echo "Keeping milestone: $title ($open_items open items)"
            fi
          }

          # ── Collect upcoming cycle dates ───────────────────────────────────────

          upcoming=()
          while IFS=: read -r date cycle_raw; do
            [[ "$date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || continue
            if [[ ! "$date" < "$TODAY" ]]; then
              upcoming+=("$date")
            fi
          done < .github/airac-cycles.yml

          # Keep only the next N upcoming cycles
          upcoming=("${upcoming[@]:0:$MAX_UPCOMING}")

          # ── Process all entries ────────────────────────────────────────────────

          labels_synced=0
          milestones_synced=0

          while IFS=: read -r date cycle_raw; do
            [[ "$date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || continue
            cycle=$(echo "$cycle_raw" | tr -d ' "')
            label="airac/$cycle"
            milestone_title="AIRAC $cycle"

            if [[ "$date" < "$CUTOFF_DATE" ]]; then
              # ── Stale: delete label and milestone if nothing references them ──
              if gh label view "$label" --repo "$GH_REPO" --json name &>/dev/null; then
                open_prs=$(gh pr list --repo "$GH_REPO" --label "$label" \
                  --state open --json number --jq 'length')
                if [[ "$open_prs" -eq 0 ]]; then
                  echo "Deleting stale label: $label (cycle date: $date)"
                  gh label delete "$label" --repo "$GH_REPO" --yes
                else
                  echo "Keeping stale label: $label ($open_prs open PRs)"
                fi
              fi
              delete_milestone_if_empty "$milestone_title"

            elif [[ " ${upcoming[*]} " == *" $date "* ]]; then
              # ── Upcoming window: create/update label and milestone ─────────────
              description="AIRAC $cycle - effective $date"
              gh label create "$label" --repo "$GH_REPO" \
                --color "$LABEL_COLOR" --description "$description" --force
              echo "Synced label: $label"
              (( labels_synced++ )) || true

              ms_number=$(upsert_milestone "$milestone_title" "$date" "$description")
              echo "Synced milestone: $milestone_title (due $date, #$ms_number)"
              (( milestones_synced++ )) || true

            else
              # ── Out-of-window: delete if empty ────────────────────────────────
              if gh label view "$label" --repo "$GH_REPO" --json name &>/dev/null; then
                open_prs=$(gh pr list --repo "$GH_REPO" --label "$label" \
                  --state open --json number --jq 'length')
                if [[ "$open_prs" -eq 0 ]]; then
                  echo "Deleting out-of-window label: $label"
                  gh label delete "$label" --repo "$GH_REPO" --yes
                fi
              fi
              delete_milestone_if_empty "$milestone_title"
            fi

          done < .github/airac-cycles.yml

          echo "### ✅ AIRAC sync complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Labels synced:** $labels_synced" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Milestones synced:** $milestones_synced" >> "$GITHUB_STEP_SUMMARY"