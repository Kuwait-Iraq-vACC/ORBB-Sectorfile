name: VFPC Data File Compiler
on:
  push:
    branches:
      - main
    paths:
      - '.data/VFPC/**'
      - '.github/workflows/Concatenate-VFPC.yml'
      - '.github/scripts/VFPC/Concatenate-VFPC.py'
concurrency:
  group: VFPC-Compile
  cancel-in-progress: true
jobs:
  compile:
    name: Compile VFPC Data Files
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run compiler
        run: python .github/scripts/VFPC/Concatenate-VFPC.py
      - name: Commit compiled files
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add ORBB/Plugins/VFPC/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Compile VFPC data files | ${{ github.event.head_commit.message }}
            Co-authored-by: ${{ github.event.head_commit.author.name }} <${{ github.event.head_commit.author.email }}>"
            git pull --rebase
            git push
          fi