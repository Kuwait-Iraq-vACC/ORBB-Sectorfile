name: Bug Report
description: Report a bug in the repository.
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "# Bug Report"
  - type: markdown
    attributes:
      value: "Before reporting a bug, ensure that you have the correct [EuroScope version](http://kuwait-iraqvacc.net/Controller%20Guidance/Software/EuroScope%20Setup/) and that you have the latest sectorfile installed."
  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Provide steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: input
    id: euroscope-version
    attributes:
      label: EuroScope Version
      placeholder: e.g. 3.2.3.2 or 3.2.9
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false