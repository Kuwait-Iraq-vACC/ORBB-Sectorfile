name: Plugin Report
description: Report a bug or required change for a EuroScope plugin.
title: "[Plugin]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "# Plugin Report"
  - type: input
    id: plugin-name
    attributes:
      label: Plugin Name
      description: Which plugin are you reporting an issue for?
      placeholder: e.g. RDFplugin, DiscordEuroscope
    validations:
      required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      description: Which version of the plugin are you running?
      placeholder: e.g. 1.0.0
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug or change required.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Provide steps to reproduce the behavior, if applicable.
    validations:
      required: false
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: input
    id: sectorfile-airac
    attributes:
      label: Sectorfile AIRAC
      description: What sectorfile version are you using?
      placeholder: e.g. 2606/01
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false