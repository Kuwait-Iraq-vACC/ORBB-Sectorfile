name: General Report
description: Report a general issue or query.
title: "[GENERAL]: "
body:
  - type: markdown
    attributes:
      value: "# General Report"
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the issue or query.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the issue here.
    validations:
      required: false