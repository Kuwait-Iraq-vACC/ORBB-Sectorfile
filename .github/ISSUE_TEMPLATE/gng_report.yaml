name: GNG Report
description: Report a bug, or a change required for to update on GNG.
title: "[GNG]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "# GNG Report
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the changes, or bug, you are reporting.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: textarea
    id: fix
    attributes:
      label: Fix
      description: Describe the fix, or change, you are proposing to resolve the issue if known.
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false